run:
  timeout: 3m
  tests: true

linters:
  disable-all: true
  enable:
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - unused
    - ineffassign
    - gofmt
    - goimports
    - revive
    - bodyclose
    - sqlclosecheck

linters-settings:
  goimports:
    local-prefixes: github.com/Zhaba1337228/max-university-event-bot
  revive:
    severity: warning
    rules:
      - name: exported
        severity: warning
        disabled: false
        arguments:
          - "checkPrivateReceivers"
          - "disableStutteringCheck"

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - bodyclose
        - revive
  exclude-dirs:
    - vendor
    - frontend
