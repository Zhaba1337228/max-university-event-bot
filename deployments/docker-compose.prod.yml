# =============================================================================
# Production docker-compose
#
# Architecture:
#   internet ─── caddy (80/443) ─── web:3000  (Next.js admin panel)
#                               └── bot:8080  (webhook /webhook/max)
#
#   web ──── bot:8081 (admin REST API, internal only)
#   bot ──── postgres:5432 (DB, internal only)
#
# TLS auto-detection (via deploy.sh):
#   DOMAIN=1.2.3.4   → HTTP only, Caddy listens on :80 only
#   DOMAIN=bot.ru     → HTTPS + Let's Encrypt, Caddy listens on :80+:443
#
# Both ports are always mapped. Caddy only binds what the Caddyfile requires:
#   http:// prefix → port 80 only (443 mapped but unused, connections refused)
#   no prefix      → port 80 (redirect) + 443 (HTTPS)
#
# Deploy:
#   make deploy
# =============================================================================

services:

  postgres:
    image: postgres:16-alpine
    env_file:
      - ../.env.prod
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true

  migrate:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env.prod
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    entrypoint: ["/app/migrate", "up"]
    networks:
      - backend
    restart: "no"

  bot:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - ../.env.prod
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    networks:
      - backend
      - frontend
    restart: unless-stopped
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        API_UPSTREAM: http://bot:8081
    depends_on:
      - bot
    environment:
      NODE_ENV: production
    networks:
      - frontend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  caddy:
    image: caddy:2-alpine
    depends_on:
      - web
      - bot
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile.gen:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - frontend
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

networks:
  backend:
    driver: bridge
    internal: true

  frontend:
    driver: bridge

volumes:
  pgdata:
  caddy_data:
  caddy_config:
