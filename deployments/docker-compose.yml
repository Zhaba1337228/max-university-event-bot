services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-maxbot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-maxbot}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-maxbot}?sslmode=disable
    entrypoint: ["/app/migrate", "up"]
    restart: "no"

  bot:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-maxbot}?sslmode=disable
    ports:
      - "8080:8080" # webhook + healthz
      - "8081:8081" # admin REST API
    restart: unless-stopped
    # Безопасность контейнера (см. SECURITY.md).
    # read_only нельзя — нам нужен writable /tmp для QR-картинок.
    # Используем tmpfs для /tmp вместо writable layer.
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # USER уже задан в Dockerfile (app:10001), не root.

volumes:
  pgdata:
