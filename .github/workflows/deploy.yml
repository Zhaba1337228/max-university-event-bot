name: deploy

on:
  push:
    branches: [main]
    # Деплоим только если изменились важные файлы — не на каждый push в docs/README
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/workflows/ci.yml"

  # Ручной запуск из вкладки Actions
  workflow_dispatch:
    inputs:
      no_build:
        description: "Пропустить docker build (только restart)"
        type: boolean
        default: false

# Один деплой за раз — новый push отменяет предыдущий если тот ещё идёт
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ── Сначала должен пройти CI ──────────────────────────────────────────────
  ci:
    uses: ./.github/workflows/ci.yml

  # ── Деплой на сервер ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 15
    environment:
      name: production
      url: http://${{ secrets.DEPLOY_HOST }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          port:     ${{ secrets.DEPLOY_PORT || 22 }}
          # Таймаут на само подключение
          connect_timeout: 30s
          # Таймаут на выполнение команд (build может занять 5+ минут)
          command_timeout: 12m
          script: |
            set -euo pipefail
            cd /opt/app

            echo "=== git pull ==="
            git fetch --all
            git reset --hard origin/main

            echo "=== deploy ==="
            if [ "${{ inputs.no_build || 'false' }}" = "true" ]; then
              bash scripts/deploy.sh --no-build
            else
              bash scripts/deploy.sh
            fi

      - name: Healthcheck
        run: |
          HOST="${{ secrets.DEPLOY_HOST }}"
          PORT="${{ secrets.DEPLOY_HTTP_PORT || 80 }}"
          URL="http://${HOST}:${PORT}/healthz"
          echo "Checking ${URL} ..."
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}" || true)
            if [ "$STATUS" = "200" ]; then
              echo "✓ Healthcheck passed (HTTP ${STATUS})"
              exit 0
            fi
            echo "  Attempt ${i}/10: HTTP ${STATUS}, retrying in 6s..."
            sleep 6
          done
          echo "✗ Healthcheck failed after 60s"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy failed! Check logs above."
          echo "To rollback manually:"
          echo "  ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          echo "  cd /opt/app && git log --oneline -5"
          echo "  git reset --hard <prev_commit> && make deploy --no-build"
